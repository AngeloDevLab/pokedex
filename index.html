<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <link rel="icon" href="./assets/images/pokeball.png">

    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/responsive.css">

    <script type="module" src="./scripts/api.js"></script>
    <script type="module" src="./scripts/main.js"></script>

</head>

<body>

    <header>
        <div class="header-content max-content">
            <div class="header-brand">
                <a href="index.html"><img src="./assets/images/pokeball.png" alt="Pokeball Image"></a>
                <p class="hide-mobile">Pokédex</p>
            </div>

            <div class="searching-content">
                <label for="searching-input">Search Pokémon</label>
                <input id="searching-input" type="search" placeholder="Search Pokémon...">
            </div>
        </div>
    </header>

    <main>

        <div id="loader" class="loader hidden">
            <img src="./assets/images/pokeball.png" alt="Loading">
        </div>

        <div id="pokemon-container" class="max-content"></div>

        <button id="load-more-btn" class="load-more-btn">load more</button>

    </main>

    <dialog id="pokemon-dialog" closedby="any">

        <div id="dialog-content" class="dialog-content"></div>

    </dialog>

    <footer>
        <div class="footer-content max-content">
            <img src="./assets/images/pokeball.png" alt="Pokeball Image">
            <a href="imprint.html" target="_blank">Imprint</a>
        </div>
    </footer>

    <script src="./scripts/templates.js"></script>
    <script src="./scripts/ui.js"></script>

</body>

</html>
