<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <link rel="icon" href="./assets/images/pokeball.png">

    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/responsive.css">

    <script src="./scripts/main.js"></script>
    <script src="./scripts/api.js"></script>
    <script src="./scripts/search.js"></script>
    <script src="./scripts/templates.js"></script>
    <script src="./scripts/dialog.js"></script>
    <script src="./scripts/ui.js"></script>

</head>

<body>

    <header>
        <div class="header-content max-content">
            <div class="header-brand">
                <a href="index.html"><img src="./assets/images/pokeball.png" alt="Pokeball Image"></a>
                <p class="hide-mobile">Pokédex</p>
            </div>

            <div class="searching-content">

                <p>Search</p>

                <button id="search-toggle" class="search-button">

                    <svg id="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m21 21-4.34-4.34" />
                        <circle cx="11" cy="11" r="8" />
                    </svg>

                    <svg id="close-icon" xmlns="http://www.w3.org/2000/svg" class="hidden" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>

                </button>
            </div>

        </div>
    </header>

    <div class="search-panel" id="search-panel">

        <div class="search-content max-content">
            <div class="search-group">
                <label for="search-name">Search by Name</label>
                <input type="text" id="search-name" placeholder="Enter name...">
                <small id="search-warning" class="hidden">
                    min. 3 characters
                </small>
            </div>

            <div class="search-group">
                <label for="filter-type">Filter by Type</label>
                <input list="type-list" id="filter-type" placeholder="Select type...">

                <datalist id="type-list">
                    <option value="fire">
                    <option value="water">
                    <option value="grass">
                    <option value="electric">
                    <option value="ice">
                    <option value="fighting">
                    <option value="poison">
                    <option value="ground">
                    <option value="flying">
                    <option value="psychic">
                    <option value="bug">
                    <option value="rock">
                    <option value="ghost">
                    <option value="dragon">
                    <option value="dark">
                    <option value="steel">
                    <option value="fairy">
                </datalist>
            </div>

            <button id="search-reset">Clear Search</button>
        </div>


    </div>

    <main>

        <div id="loader" class="loader hidden">
            <img src="./assets/images/pokeball.png" alt="Loading">
        </div>

        <button id="load-previous-btn" class="load-btn">load previous</button>

        <div id="pokemon-container" class="max-content"></div>

        <button id="load-more-btn" class="load-btn">load more</button>

    </main>

    <dialog id="pokemon-dialog" closedby="any"></dialog>

    <footer>
        <div class="footer-content max-content">
            <img src="./assets/images/pokeball.png" alt="Pokeball Image">
            <a href="imprint.html" target="_blank">Imprint</a>
        </div>
    </footer>

</body>

</html>
